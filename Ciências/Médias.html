<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Médias de Ciências</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="https://img.icons8.com/ios-filled/200/002663/grades.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; position: relative; padding-bottom: 50px; }
        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: linear-gradient(315deg, #4461f2 10%, #7a91f5 10%, #7a91f5 15%, #b2c0f9 15%, #b2c0f9 20%, transparent 20%), linear-gradient(315deg, transparent 80%, #b2c0f9 80%, #b2c0f9 85%, #7a91f5 85%, #7a91f5 90%, #4461f2 90%); opacity: 0.5; }
        .header-area { text-align: center; margin: 60px 0; }
        .header-area h1 { font-size: 2.8rem; color: #333; }
        .table-container { width: 95%; max-width: 1200px; background: white; padding: 40px; border-radius: 50px; box-shadow: 0 30px 70px rgba(0, 0, 0, 0.2); animation: fadeInUp 0.8s ease-out; }
        table { width: 100%; border-collapse: separate; border-spacing: 15px; }
        th { color: #5d70f9; font-size: 0.8rem; text-transform: uppercase; padding-bottom: 5px; vertical-align: bottom; }
        .max-label { display: block; font-size: 0.65rem; color: #bbb; margin-top: 5px; }
        .input-titulo-clean { background: transparent; border: none; color: #5d70f9; font-weight: 800; text-align: center; text-transform: uppercase; width: 100%; outline: none; font-size: 0.9rem; }
        td { background: #f0f3ff; border-radius: 25px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        .td-resultado { background: #5d70f9; box-shadow: 0 10px 25px rgba(93, 112, 249, 0.4); }
        .nota-input { width: 100%; border: none; background: transparent; padding: 20px; font-size: 1.4rem; text-align: center; font-weight: 700; color: #333; outline: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .resultado-display { width: 100%; border: none; background: transparent; padding: 20px; font-size: 1.6rem; text-align: center; font-weight: 800; color: white; outline: none; cursor: not-allowed; }
        .btn-voltar { margin-top: 40px; text-decoration: none; color: white; background: #5d70f9; padding: 18px 45px; border-radius: 25px; font-weight: 700; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; }
        .btn-voltar:hover { background: #0114a8; transform: scale(1.05); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <header class="header-area">
        <h1>Médias</h1>
        <p style="color: #5d70f9; font-weight: 600; margin-top: 10px;">Médias da matéria de Ciências</p>
    </header>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Atividade 1 <span class="max-label">máx: 10</span></th>
                    <th>Atividade 2 <span class="max-label">máx: 10</span></th>
                    <th>Atividade 3 <span class="max-label">máx: 10</span></th>
                    <th>
                        <input type="text" id="titulo_outros" value="Outros" class="input-titulo-clean salvavel">
                        <span class="max-label">máx: 20</span>
                    </th>
                    <th>Prova <span class="max-label">máx: 50</span></th>
                    <th style="color: #333;">Total <span class="max-label">máx: 100</span></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="number" id="n1" data-max="10" placeholder="0" class="nota-input salvavel val"></td>
                    <td><input type="number" id="n2" data-max="10" placeholder="0" class="nota-input salvavel val"></td>
                    <td><input type="number" id="n3" data-max="10" placeholder="0" class="nota-input salvavel val"></td>
                    <td><input type="number" id="n_outros" data-max="20" placeholder="0" class="nota-input salvavel val"></td>
                    <td><input type="number" id="n_prova" data-max="50" placeholder="0" class="nota-input salvavel val"></td>
                    <td class="td-resultado">
                        <input type="text" id="media_final" value="0.0" class="resultado-display" readonly>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <a href="https://mindspaceeducacao.github.io/MindSpace/Ci%C3%AAncias/%C3%81rea%20do%20Educador.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs3OTqOeVVzcxlrcM8Th5ObkhtXca69Ac",
            authDomain: "mindspace-educacao.firebaseapp.com",
            projectId: "mindspace-educacao",
            storageBucket: "mindspace-educacao.firebasestorage.app",
            messagingSenderId: "569394609531",
            appId: "1:569394609531:web:9ab5ba6bc2181bc5a911de",
            databaseURL: "https://mindspace-educacao-default-rtdb.firebaseio.com/" // Link padrão do RTDB
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'hadassa/cien');

        const campos = document.querySelectorAll('.salvavel');
        const camposNotas = document.querySelectorAll('.val');
        const displayMedia = document.getElementById('media_final');

        function calcularSoma() {
            let total = 0;
            camposNotas.forEach(nota => {
                let valor = parseFloat(nota.value) || 0;
                let maximo = parseFloat(nota.getAttribute('data-max'));
                if (valor > maximo) { valor = maximo; nota.value = maximo; }
                total += valor;
            });
            displayMedia.value = total.toFixed(1);
        }

        // Ler dados do Firebase
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                campos.forEach(campo => {
                    if (data[campo.id] !== undefined) {
                        campo.value = data[campo.id];
                    }
                });
                calcularSoma();
            }
        });

        // Salvar no Firebase ao digitar
        campos.forEach(campo => {
            campo.addEventListener('input', () => {
                update(dbRef, { [campo.id]: campo.value });
                if (campo.classList.contains('val')) calcularSoma();
            });
        });
    </script>
</body>
</html>
