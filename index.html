<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSpace</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/fs6QsSL/FAVICON.png?v=3">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <hr class="top-line">

    <section class="hero">
        <div class="hero-container">
            <div class="hero-content">
                <h1>Aprenda de forma inteligente com o MindSpace</h1>
                <a href="https://mindspaceeducacao.github.io/MindSpace/Tela-de-Acesso/Tela-de-Acesso.html" class="btn-outline">Acessar Plataforma</a>
            </div>
            
            <div class="circle-cloud">
                <div class="blob b-blue-light"></div>
                <div class="blob b-navy"></div>
                <div class="blob b-gray"></div>
                <div class="blob b-blue-mid"></div>
                <div class="blob b-blue-deep"></div>
                <div class="blob b-gray-small"></div>
                <div class="blob b-navy-small"></div>
                
                <div class="blob b-extra-1"></div>
                <div class="blob b-extra-2"></div>
                <div class="blob b-extra-3"></div>
                <div class="blob b-extra-4"></div>
                <div class="blob b-extra-5"></div>
            </div>
        </div>
    </section>

    <hr class="section-divider">

    <section class="subjects">
        <h2>Matérias que oferecemos</h2>
        
        <div class="subjects-grid">
            <div class="subject-card">
                <div class="circle-bg bg-math">
                    <img src="https://img.icons8.com/ios/100/ffffff/calculator.png" alt="Matemática">
                </div>
                <span class="subject-name">• Matemática •</span>
            </div>

            <div class="subject-card">
                <div class="circle-bg bg-science">
                    <img src="https://img.icons8.com/ios/100/ffffff/test-tube.png" alt="Ciências">
                </div>
                <span class="subject-name">• Ciências •</span>
            </div>

            <div class="subject-card">
                <div class="circle-bg bg-portuguese">
                    <img src="https://img.icons8.com/ios/100/ffffff/open-book.png" alt="Português">
                </div>
                <span class="subject-name">• Português •</span>
            </div>
        </div>
    </section>

    <hr class="footer-line">
    <footer class="mind-footer">
        <div class="footer-logo">
            <img src="https://i.ibb.co/1YvDJ3VQ/MindSpace-Isotipo.png" alt="MindSpace Logo" class="official-logo">
            <span>MindSpace</span>
        </div>
    </footer>

</body>
</html>
