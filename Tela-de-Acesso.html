<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Acesso | MindSpace</title>
    
    <link rel="icon" href="https://i.ibb.co/1YvDJ3VQ/MindSpace-Isotipo.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* DOCUMENTAÇÃO CSS:
           - Reset global.
           - Estilização da barra superior e botões circulares.
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* DETALHE SUPERIOR */
        .header-decor {
            width: 100%;
            margin-bottom: 80px;
        }
        .line-top {
            height: 18px;
            background-color: #1a4fa0;
        }
        .line-bottom {
            height: 8px;
            background-color: #6d8db4;
            margin-top: 6px;
        }

        /* CONTEÚDO CENTRAL */
        .main-wrapper {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-weight: 400;
            font-size: 2.5rem;
            color: #1a1a1a;
            margin-bottom: 70px;
            letter-spacing: -0.5px;
        }

        .options-group {
            display: flex;
            gap: 120px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Links de opção */
        .option-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none; /* Remove o sublinhado do link */
            color: inherit; /* Mantém a cor do texto preta */
            transition: transform 0.3s ease;
        }

        /* BOTÕES CIRCULARES */
        .circle {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* Cores dos círculos */
        .bg-aluno { background-color: #1a4fa0; }
        .bg-prof { background-color: #6d8db4; }

        /* Ícones brancos */
        .circle img {
            width: 60%;
            height: auto;
            object-fit: contain;
            filter: brightness(0) invert(1); 
        }

        /* Texto abaixo */
        .label {
            font-size: 2rem;
            color: #333;
            font-weight: 400;
        }

        /* Efeito ao passar o mouse em todo o conjunto (círculo + texto) */
        .option-item:hover .circle {
            transform: scale(1.08);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .option-item:active .circle {
            transform: scale(0.95);
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .options-group { gap: 40px; }
            .circle { width: 180px; height: 180px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="header-decor">
        <div class="line-top"></div>
        <div class="line-bottom"></div>
    </header>

    <main class="main-wrapper">
        <h1>Quem irá acessar?</h1>

        <div class="options-group">
            
            <a href="https://mindspaceeducacao.github.io/MindSpace/Portal-do-Aluno" class="option-item">
                <div class="circle bg-aluno">
                    <img src="https://img.icons8.com/ios-filled/200/ffffff/graduation-cap.png" alt="Portal do Aluno">
                </div>
                <span class="label">Aluno</span>
            </a>

            <a href="https://mindspaceeducacao.github.io/MindSpace/Portal-do-Educador" class="option-item">
                <div class="circle bg-prof">
                    <img src="https://img.icons8.com/ios-filled/200/ffffff/teacher.png" alt="Portal do Educador">
                </div>
                <span class="label">Professor</span>
            </a>

        </div>
    </main>

</body>
</html>
