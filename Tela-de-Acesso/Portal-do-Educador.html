<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Educador</title>
     <link rel="icon" href="https://img.icons8.com/ios-filled/200/002663/teacher.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Estilos e Animações Mantidos */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body {
            background-color: #ffffff; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden;
            background-image: 
                linear-gradient(135deg, #4461f2 12%, #7a91f5 12%, #7a91f5 18%, #b2c0f9 18%, #b2c0f9 24%, transparent 24%),
                linear-gradient(135deg, transparent 76%, #b2c0f9 76%, #b2c0f9 82%, #7a91f5 82%, #7a91f5 88%, #4461f2 88%);
        }
        .professor-badge { position: absolute; top: 35px; right: 35px; background-color: #5d70f9; color: white; display: flex; align-items: center; padding: 10px 25px; border-radius: 50px; gap: 12px; animation: fadeInRight 0.8s ease-out; }
        .professor-badge img { width: 45px; height: 45px; animation: softPulse 3s infinite ease-in-out; }
        .content-area { text-align: center; width: 100%; max-width: 800px; padding: 20px; animation: fadeInUp 1s ease-out; }
        .instruction-text { font-size: 1.8rem; color: #333; margin-bottom: 35px; font-weight: 400; }
        .code-input {
            background-color: #5d70f9; width: 90%; max-width: 650px; height: 80px; border: none; border-radius: 40px; color: white; font-size: 1.6rem; text-align: center; outline: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .code-input:focus { transform: scale(1.05); background-color: #4b61e6; box-shadow: 0 10px 30px rgba(75, 97, 230, 0.4); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes softPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div class="professor-badge">
        <img src="https://img.icons8.com/ios-filled/200/ffffff/teacher.png" alt="Professor">
        <span>PROFESSOR</span>
    </div>

    <div class="content-area">
        <h1 class="instruction-text">Insira seu código do professor.</h1>
        <input type="text" class="code-input" id="campoCodigo" placeholder="">
    </div>

    <script>
        const input = document.getElementById('campoCodigo');

        // Mudamos para o evento 'keydown' (tecla pressionada)
        input.addEventListener('keydown', function(event) {
            
            // Verificamos se a tecla apertada foi o Enter
            if (event.key === "Enter") {
                
                const valor = this.value.toLowerCase();

                if (valor === 'hadassaartes') {
                    window.location.href = "https://mindspaceeducacao.github.io/MindSpace/Artes/%C3%81rea%20do%20Educador.html"; 
                } 
                else if (valor === 'hadassacien') {
                    window.location.href = "https://mindspaceeducacao.github.io/MindSpace/Ciências/%C3%81rea%20do%20Educador.html"; 
                }
                else if (valor === 'dluccamat') {
                    window.location.href = "https://mindspaceeducacao.github.io/MindSpace/Matemática/%C3%81rea%20do%20Educador.html"; 
                }
                    else if (valor === 'dluccaport') {
                    window.location.href = "https://mindspaceeducacao.github.io/MindSpace/Português/%C3%81rea%20do%20Educador.html"; 
                }
                else {
                    // Opcional: Avisar que o código está errado
                    alert("Código não encontrado. Tente novamente!");
                    this.value = ""; // Limpa o campo
                }
            }
        });
    </script>

</body>
</html>
