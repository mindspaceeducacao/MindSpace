<html lang="pt-br"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno</title>
     <link rel="icon" href="https://img.icons8.com/ios-filled/200/002663/graduation-cap.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&amp;display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* Ondas Superiores */
        .waves-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            line-height: 0;
            z-index: -1;
        }

        /* Ondas Inferiores */
        .waves-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            line-height: 0;
            z-index: -1;
        }

        /* Badge Aluno */
        .header-badge {
            position: absolute;
            top: 20px;
            right: 40px;
            text-align: center;
        }

        .header-badge img {
            width: 70px;
        /* Este filtro força qualquer imagem colorida a ficar totalmente branca */
            filter: brightness(0) invert(1);
        }

        .badge-text {
            background-color: #2e3d59;
            color: white;
            padding: 5px 30px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-top: -10px;
            display: inline-block;
        }

        /* Área de Conteúdo */
        .content {
            text-align: left;
            z-index: 1;
        }

        h2 {
            color: #333;
            font-weight: 500;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 15px;
        }

        .code-input {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    background-color: #2e3d59;
    color: white;
    text-align: center;
    font-size: 28px;
    font-family: 'Montserrat', sans-serif;
    outline: none;
    
    /* Transição suave para a animação não ser brusca */
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Quando o usuário clicar/estiver escrevendo */
.code-input:focus {
    transform: scale(1.15); /* Fica levemente maior */
    background-color: #3d5175; /* Muda um pouco o tom de azul para dar destaque */
    box-shadow: 0 10px 20px rgba(0,0,0,0.2); /* Adiciona uma sombra suave */
}

        /* Remove setas dos inputs (caso ainda use type number) */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="waves-header">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
            <path d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: #6a85a4; opacity: 0.3;"></path>
            <path d="M0.00,49.98 C150.00,150.00 271.49,-25.66 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: #6a85a4;"></path>
        </svg>
    </div>

    <div class="header-badge">
        <img src="https://img.icons8.com/ios-filled/200/ffffff/graduation-cap.png" alt="Icon">
        <br>
        <span class="badge-text">ALUNO</span>
    </div>

    <div class="content">
        <h2>Insira o código da sua escola.</h2>
        <div class="input-group">
            <input type="text" class="code-input" maxlength="1" oninput="moveFocus(this, 0)">
            <input type="text" class="code-input" maxlength="1" oninput="moveFocus(this, 1)">
            <input type="text" class="code-input" maxlength="1" oninput="moveFocus(this, 2)">
            <input type="text" class="code-input" maxlength="1" oninput="moveFocus(this, 3)">
            <input type="text" class="code-input" maxlength="1" oninput="moveFocus(this, 4)">
            <input type="text" class="code-input" maxlength="1" oninput="moveFocus(this, 5)">
        </div>
    </div>

    <div class="waves-footer">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
            <path d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z" style="stroke: none; fill: #6a85a4; opacity: 0.3;"></path>
            <path d="M0.00,49.98 C250.00,150.00 350.00,0.00 500.00,100.00 L500.00,150.00 L0.00,150.00 Z" style="stroke: none; fill: #6a85a4;"></path>
        </svg>
    </div>

    <script>
        function moveFocus(current, index) {
            const inputs = document.querySelectorAll('.code-input');
            if (current.value.length >= 1 && index < 5) {
                inputs[index + 1].focus();
            }
        }

        // Nova lógica para detectar a tecla Enter e validar o código
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const inputs = document.querySelectorAll('.code-input');
                let codigoDigitado = "";
                
                // Junta o valor de todas as bolinhas
                inputs.forEach(input => {
                    codigoDigitado += input.value;
                });

                // Verifica se o código é o esperado
                if (codigoDigitado.toLowerCase() === "17h3ba8") {
                    // Redireciona para a URL desejada (ajuste o link abaixo)
                    window.open("https://mindspaceeducacao.github.io/MindSpace/Aluno/Espa%C3%A7o%20do%20Aluno", "_blank"); 
                } else {
                    alert("Código incorreto. Tente novamente.");
                }
            }
        });
    </script>

</body></html>
