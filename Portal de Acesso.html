<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Acesso - Montserrat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* DOCUMENTAÇÃO CSS:
           - Reset de margens para o detalhe superior colar no topo.
           - Flexbox para centralização perfeita.
           - Cores extraídas diretamente do Modelo 3.jpeg.
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* DETALHE SUPERIOR DA PÁGINA */
        .header-decor {
            width: 100%;
            margin-bottom: 100px;
        }
        .line-top {
            height: 18px;
            background-color: #1a4fa0; /* Azul Escuro do Modelo */
        }
        .line-bottom {
            height: 8px;
            background-color: #6d8db4; /* Azul Claro do Modelo */
            margin-top: 6px;
        }

        /* CONTEÚDO CENTRAL */
        .main-wrapper {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 400;
            font-size: 2.5rem;
            color: #1a1a1a;
            margin-bottom: 70px;
            letter-spacing: -0.5px;
        }

        .options-group {
            display: flex;
            gap: 120px; /* Espaçamento entre os círculos */
            justify-content: center;
            flex-wrap: wrap;
        }

        .option-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        /* BOTÕES CIRCULARES */
        .circle {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            margin-bottom: 25px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .circle:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        /* Cores específicas dos botões */
        .bg-aluno { background-color: #1a4fa0; }
        .bg-prof { background-color: #6d8db4; }

        /* ÍCONES (Imagens do Icons8 em Branco) */
        .circle img {
            width: 60%;
            height: auto;
            object-fit: contain;
            /* Filtro para garantir que fiquem brancos caso mude a fonte */
            filter: brightness(0) invert(1); 
        }

        /* TEXTO ABAIXO DO CÍRCULO */
        .label {
            font-size: 2rem;
            color: #333;
            font-weight: 400;
        }

        /* Responsividade básica para celular */
        @media (max-width: 600px) {
            .options-group { gap: 40px; }
            .circle { width: 180px; height: 180px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="header-decor">
        <div class="line-top"></div>
        <div class="line-bottom"></div>
    </header>

    <main class="main-wrapper">
        <h1>Quem irá acessar?</h1>

        <div class="options-group">
            
            <div class="option-item">
                <button class="circle bg-aluno">
                    <img src="https://img.icons8.com/ios-filled/200/ffffff/graduation-cap.png" alt="Ícone Aluno">
                </button>
                <span class="label">Aluno</span>
            </div>

            <div class="option-item">
                <button class="circle bg-prof">
                    <img src="https://img.icons8.com/ios-filled/200/ffffff/teacher.png" alt="Ícone Professor">
                </button>
                <span class="label">Professor</span>
            </div>

        </div>
    </main>

</body>
</html>
